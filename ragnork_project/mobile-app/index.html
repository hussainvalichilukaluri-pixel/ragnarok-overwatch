<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ragnarok Command</title>
    <style>
      :root {
        --primary: #00e676; --bg-dark: #0a0a0c; --card-bg: rgba(255, 255, 255, 0.05); --text-muted: #8892b0;
      }
      body { background-color: var(--bg-dark); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; transition: background 0.3s; }
      
      body.qr-active { background: transparent !important; }
      body.qr-active .container { display: none; }
      
      .bg-glow { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,230,118,0.15) 0%, rgba(0,0,0,0) 70%); top: -100px; right: -100px; z-index: -1; border-radius: 50%; }
      .container { width: 100%; max-width: 400px; padding: 30px 20px; box-sizing: border-box; display: flex; flex-direction: column; height: 100vh; justify-content: space-between; z-index: 10; }
      
      .header { text-align: center; margin-bottom: 20px; }
      h1 { font-size: 2.2rem; margin: 0; font-weight: 800; letter-spacing: -1px; }
      .subtitle { color: var(--primary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; font-weight: 600; }

      .status-card { background: var(--card-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 25px; text-align: center; transition: all 0.3s ease; }
      .gps-badge { display: inline-block; padding: 8px 16px; border-radius: 30px; font-size: 0.8rem; font-weight: 700; background: rgba(0, 230, 118, 0.15); color: var(--primary); margin-bottom: 15px; border: 1px solid rgba(0, 230, 118, 0.3); }

      #uiMessage { font-size: 1.1rem; color: #ccd6f6; line-height: 1.5; font-weight: 500; min-height: 50px; }

      .action-area { padding-bottom: 20px; }
      button { width: 100%; padding: 18px; border-radius: 16px; font-size: 1.05rem; font-weight: bold; border: none; cursor: pointer; transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; }
      button:active { transform: scale(0.97); }
      #btnScan { background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); }
      #btnDetach { background: rgba(255, 59, 48, 0.1); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.3); display: none; }

      #qrOverlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
      .scan-box { width: 250px; height: 250px; border: 4px solid var(--primary); border-radius: 20px; box-shadow: 0 0 0 4000px rgba(0,0,0,0.8); position: relative; }
      #btnCancelScan { position: absolute; bottom: 50px; background: rgba(255,255,255,0.2); width: 80%; backdrop-filter: blur(5px); color: white; border: 1px solid rgba(255,255,255,0.4); }
    </style>
  </head>
  <body>
    <div class="bg-glow"></div>
    <div class="container" id="mainUI">
      <div class="header">
        <h1>RAGNAROK</h1>
        <div class="subtitle">Overwatch Mobile</div>
      </div>
      <div class="status-card" id="statusCard">
        <div id="gpsBadge" class="gps-badge">🛰️ GPS: SECURE TRACKING</div>
        <div id="uiMessage">System Standby.<br>Ready to pair asset.</div>
      </div>
      <div class="action-area">
        <button id="btnScan">📷 Scan Asset QR</button>
        <button id="btnDetach">🔓 Detach & Download Logs</button>
      </div>
    </div>
    <div id="qrOverlay">
      <h3 style="color:white; margin-bottom:30px; z-index: 101;">Align QR Code</h3>
      <div class="scan-box"></div>
      <button id="btnCancelScan">Cancel Scan</button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
